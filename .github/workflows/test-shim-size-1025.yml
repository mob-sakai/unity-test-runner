# Required secrets
#   UNITY_LICENSE: The contents of Unity license file
#   UNITY_EMAIL: Unity user email to login
#   UNITY_PASSWORD: Unity user password to login
name: 🧪 Test (--shm-size=1025m)

on:
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        projectPath:
          - unity-project-with-correct-tests
        image:
          - unityci/editor:ubuntu-6000.5.2f1-base-3.2.2
          - ghcr.io/mob-sakai/unity3d:6000.5.2f1
          - ghcr.io/mob-sakai/unity3d:6000.6.0b2
          - ghcr.io/mob-sakai/unity3d:6000.7.0a1
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v7

      - name: "🧪 Run tests"
        uses: mob-sakai/unity-test-runner@2daca32470ee589ddedc42051ce1472733177d20
        timeout-minutes: 45
        with:
          customImage: ${{ matrix.image }}
          customParameters: -nographics
          checkName: ${{ matrix.image }} Test Results
          githubToken: ${{ github.token }}
          projectPath: unity-project-with-correct-tests
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
